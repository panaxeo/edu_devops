apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/panaxeo/edu_devops.git        # github
    targetRevision: {{ .Values.targetRevision }}              # github
    path: k8s/apps/devops-app/overlays/{{ .Values.devopsApp.overlay }}  # github
    # repoURL: http://cluster.gitea.local:{{ .Values.traefik.port }}/gitea/k8s.git         # gitea
    # targetRevision: main                                      # gitea
    # path: overlays/{{ .Values.devopsApp.overlay }}                      # gitea
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-app
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
    - CreateNamespace=true