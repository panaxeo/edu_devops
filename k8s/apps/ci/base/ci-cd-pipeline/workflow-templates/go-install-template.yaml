apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: go-install-template
  namespace: argo-development
spec:
  templates:
    - name: go-install
      container:
        image: golang
        command: [go, mod, tidy]
        workingDir: /mnt/clone
        volumeMounts:
          - name: workdir
            mountPath: /mnt/clone
