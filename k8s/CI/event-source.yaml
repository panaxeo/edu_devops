apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: webhook
  namespace: argo-development
spec:
  service:
    ports:
      - port: 12000
        targetPort: 12000
  webhook:
    example:
      port: "12000"
      endpoint: /example
      method: POST 
    backend-push:
      port: "12000"
      endpoint: /backend-push
      method: POST
      secure: false
      events:
        - push