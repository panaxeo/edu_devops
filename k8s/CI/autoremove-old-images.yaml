apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: autoremove-old-images-template
  namespace: argo-development
spec:
  entrypoint: autoremove-old-images
  templates:
    - name: autoremove-old-images
      inputs:
        parameters:
        - name: repo_type #(frontend-devops-app or backend-devops-app)
      steps:
        - - name: list-images-and-remove-images
            arguments:
                parameters:
                  - name: repo_type
                    value: "{{inputs.parameters.repo_type}}"
            template: list-images-and-remove-images

    - name: list-images-and-remove-images
      inputs:
        parameters:
          - name: repo_type
      script:
        image: docker:dind
        command: [sh]
        securityContext:
          privileged: true
        volumeMounts:
        - name: kaniko-secret
          mountPath: /kaniko/.docker/
        source: |
          dockerd &
          sleep 10
          
          apk update && apk add curl jq

          repo_type="{{inputs.parameters.repo_type}}"

          if [ "$repo_type" = "backend-devops-app" ]; then
              REPO="backend"
          else
              REPO="frontend"
          fi


          AUTH=$(jq -r '.auths["https://index.docker.io/v1/"].auth' /kaniko/.docker/config.json)
          USERNAME=$(echo $AUTH | base64 -d | cut -d ':' -f 1)
          PASSWORD=$(echo $AUTH | base64 -d | cut -d ':' -f 2)

          TOKEN=$(curl -m 20 -s -H "Content-Type: application/json" -X POST -d '{"username":"'$USERNAME'", "password":"'$PASSWORD'"}' "https://hub.docker.com/v2/users/login/" | jq -r .token)
          images=$(curl -m 20 -H "Authorization: JWT ${TOKEN}" "https://hub.docker.com/v2/repositories/pnxedudevops/apps/tags/" | jq -r '.results | map(.name) | .[]' | grep -E "${REPO}-[0-9a-fA-F-]{40}")

          if [ -n "$images" ]; then
            echo "Deleting the following images: $images"
            
            for image in $images; do
              echo "Deleting image: $image"
              curl -s -H "Authorization: JWT ${TOKEN}" -X DELETE \
              "https://hub.docker.com/v2/repositories/pnxedudevops/apps/tags/$image/"
            done
          else
            echo "No images found to delete."
          fi