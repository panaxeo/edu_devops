apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: enforce-resource-limits
spec:
  failurePolicy: Fail
  validations:
    - expression: | 
        (object.metadata.name == "devops-app-backend" || object.metadata.name == "devops-app-frontend") &&
        object.spec.template.spec.containers.all(container,
        (container.name == "devops-app-backend-container" || container.name == "devops-app-frontend-container") &&
        has(container.resources))
      message: > 
        Debug: Containers: {{ object.spec.template.spec.containers }}. 
        Ports: {{ object.spec.template.spec.containers[0].ports }}.
        "Containers must specify memory and CPU resource limits."
  matchConstraints:
    resourceRules:
    - apiGroups: ["apps"]
      apiVersions: ["v1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["deployments"]
